<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Querétaro / Museos</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--color-bg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      cursor: default;
    }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: var(--page-y) var(--page-x) 0;
      z-index: var(--z-overlay);
      display: flex; justify-content: space-between; align-items: flex-start;
      background: var(--color-bg);
    }
    #site-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em; color: var(--color-text);
      text-transform: uppercase; text-decoration: none;
    }
    #nav-container { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.04em; position: relative; }
    #nav-trigger { color: var(--color-text-muted); cursor: default; }
    #nav-menu {
      display: flex; flex-direction: column; gap: 0.55rem;
      position: absolute; top: 100%; right: 0; padding-top: 0.8rem;
      opacity: 0; pointer-events: none; transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    #nav-container:hover #nav-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
    #nav-menu a { color: var(--color-text-muted); text-decoration: none; text-transform: uppercase; white-space: nowrap; }
    #nav-menu a:hover { color: var(--color-text); }

    #sub-nav {
      position: fixed;
      top: calc(var(--page-y) + 1.6rem); left: var(--page-x);
      display: flex; align-items: center; gap: 1.8rem;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      z-index: calc(var(--z-overlay) - 1);
      background: var(--color-bg);
    }
    #sub-nav a { color: var(--color-text-muted); text-decoration: none; transition: color 150ms ease; }
    #sub-nav a:hover { color: var(--color-text); }
    #sub-nav a.active { color: var(--color-text); }
    #sub-nav .back { padding-right: 1rem; border-right: 1px solid var(--color-surface); }

    /* ── Scrollable content ── */
    #content {
      padding-top: var(--header-clearance);
      padding-left: var(--page-x);
      padding-right: var(--page-x);
      padding-bottom: var(--page-y);
    }

    #gallery {
      columns: 3;
      column-gap: 1.8vw;
    }

    @media (max-width: 700px) {
      #gallery { columns: 1; }
    }

    .gallery-img {
      width: 100%;
      display: block;
      margin-bottom: 1.8vw;
      break-inside: avoid;
      background: var(--color-surface);
    }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
  </div>

  <nav id="sub-nav">
    <a href="/queretaro/" class="back">← querétaro</a>
    <a href="/queretaro/arquitectos/">arquitectos</a>
    <a href="/queretaro/artistas/">artistas</a>
    <a href="/queretaro/museos/" class="active">museos</a>
    <a href="/queretaro/mutek/">mutek</a>
  </nav>

  <div id="content">
    <div id="gallery">
      <img class="gallery-img" src="/queretaro/assets/Museos/Drawing-on-the-Water-Surface-Created-by-the-Dance-of-Koi-and-People-Infinity_04-2-1.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/superblue-suspension-drift-meadow-model1-orioltarridas.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/smg2103-a-whole-new-world-universe-of-water-particles-and-flowers-and-people-4x3-5mb.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/65bd0b1da214191c650a768b_experience-guide-es-devlin.webp" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/54588_dimensional_sampling_yuxi_cao_4-Cropped-cover.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/immersive-art-installation-exhibition.png" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/UFO_NXT_Museum2.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/nl-nxtmuseum.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/IMG_8965.webp" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/_DSC7267.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/image.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/Museos/photo-fd2dc898-aa27-4245-8908-867b182752b6.avif" loading="lazy" onerror="this.style.display='none'">
    </div>
  </div>

</body>
</html>
