<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Querétaro / Arquitectos</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      background: var(--color-bg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      cursor: default;
      user-select: none;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: var(--page-y) var(--page-x) 0;
      z-index: var(--z-overlay);
      display: flex; justify-content: space-between; align-items: flex-start;
      background: var(--color-bg);
    }
    #site-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em; color: var(--color-text);
      text-transform: uppercase; text-decoration: none;
    }

    /* ── Sub-nav ── */
    #sub-nav {
      position: fixed;
      top: calc(var(--page-y) + 1.6rem); left: var(--page-x);
      display: flex; align-items: center; gap: 1.8rem;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      z-index: calc(var(--z-overlay) - 1);
      background: var(--color-bg);
      padding-bottom: 0.2rem;
    }
    #sub-nav a { color: var(--color-text-muted); text-decoration: none; transition: color 150ms ease; }
    #sub-nav a:hover { color: var(--color-text); }
    #sub-nav a.active { color: var(--color-text); }
    #sub-nav .back { padding-right: 1rem; border-right: 1px solid var(--color-surface); }

    /* ── Sticky sidebar layout ── */
    /* Left: fixed, holds the name list */
    #left {
      position: fixed;
      top: var(--header-clearance); left: 0; bottom: 0;
      width: 36%;
      padding-left: var(--page-x); padding-right: 4vw;
      display: flex; flex-direction: column; justify-content: center;
      gap: 0.1rem;
      overflow: hidden;
    }

    .person-name {
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(1.2rem, 2vw, 1.7rem);
      color: var(--color-text-muted);
      letter-spacing: 0.01em; line-height: 1.4;
      cursor: pointer;
      transition: color 150ms ease;
      padding: 0.15rem 0;
    }
    .person-name:hover,
    .person-name.active { color: var(--color-text); }

    /* Right: scrollable content */
    #right {
      margin-left: 36%;
      padding-right: var(--page-x);
      padding-top: calc(var(--header-clearance) + 2vh);
      padding-bottom: 8vh;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    #portrait-wrap {
      width: 100%;
      height: calc(100vh - var(--header-clearance) - 4vh);
      overflow: hidden;
      background: var(--color-surface);
      flex-shrink: 0;
    }
    #portrait-wrap img {
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      transition: opacity 250ms ease;
    }
    #portrait-wrap img.fade { opacity: 0; }

    #work-strip {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.8rem;
    }
    .work-thumb {
      aspect-ratio: 4/3;
      background: var(--color-surface);
      overflow: hidden;
    }
    .work-thumb img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: opacity 250ms ease;
    }
    .work-thumb img.fade { opacity: 0; }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(250,250,248,0.97);
      z-index: 9999;
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; cursor: default; }

    #portrait-wrap img,
    .work-thumb img { cursor: zoom-in; }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
  </div>

  <nav id="sub-nav">
    <a href="/queretaro/" class="back">← querétaro</a>
    <a href="/queretaro/arquitectos/" class="active">arquitectos</a>
    <a href="/queretaro/artistas/">artistas</a>
    <a href="/queretaro/museos/">museos</a>
    <a href="/queretaro/mutek/">mutek</a>
  </nav>

  <!-- Lightbox -->
  <div id="lightbox"><img id="lb-img" src="" alt=""></div>

  <!-- Fixed left: name list -->
  <div id="left"></div>

  <!-- Scrollable right: portrait + work -->
  <div id="right">
    <div id="portrait-wrap">
      <img id="portrait-img" src="" alt="">
    </div>
    <div id="work-strip">
      <div class="work-thumb"><img class="work-img" src="" alt=""></div>
      <div class="work-thumb"><img class="work-img" src="" alt=""></div>
      <div class="work-thumb"><img class="work-img" src="" alt=""></div>
    </div>
  </div>

  <script>
    const BASE = '/queretaro/assets';
    const people = [
      {
        name: 'Abel Perles',
        portrait: `${BASE}/Arquitectos/Abel Perles/053A2790.jpg`,
        work: [
          `${BASE}/Arquitectos/Abel Perles/CCT-330-170.jpg`,
          `${BASE}/Arquitectos/Abel Perles/PRODUCTORA_TEOTITLAN_Luis-Gallardo-1.jpg`,
        ]
      },
      {
        name: 'Alejandro Dacosta',
        portrait: `${BASE}/Arquitectos/Alejandro Dacosta/5J6A8211-Edit copy.jpg`,
        work: [
          `${BASE}/Arquitectos/Alejandro Dacosta/work/Lobbie-villas-flamingos-holbox.webp`,
          `${BASE}/Arquitectos/Alejandro Dacosta/work/alejandro-dacosta-casa-elisa-Collater.al-014.jpg`,
          `${BASE}/Arquitectos/Alejandro Dacosta/work/elsilencio02.jpg`,
        ]
      },
      {
        name: 'Carlos H Matos',
        portrait: `${BASE}/Arquitectos/Carlos H Matos/n5TZR64Ef7tyNJVgniTAWH.jpg`,
        work: [
          `${BASE}/Arquitectos/Carlos H Matos/work/casa-monte-carlos-matos-mexico_dezeen_2364_col_6-scaled.jpg`,
          `${BASE}/Arquitectos/Carlos H Matos/work/chm-2022-01-ap-1-1-image-copy.webp`,
          `${BASE}/Arquitectos/Carlos H Matos/work/QNwAXw32qAKevTnQdg5KGJ.jpg`,
        ]
      },
      {
        name: 'Hector Esrawe',
        portrait: `${BASE}/Arquitectos/Hector Esrawe/dezeen-awards-2021-judges-Hector-Esrawe-sq.jpg`,
        work: [
          `${BASE}/Arquitectos/Hector Esrawe/work/7-Materia-Prima.webp`,
          `${BASE}/Arquitectos/Hector Esrawe/work/Destileria-6.webp`,
          `${BASE}/Arquitectos/Hector Esrawe/work/Genevieve_Lutkin_ARCA-1.webp`,
        ]
      },
      {
        name: 'Ludwig Godefroy',
        portrait: `${BASE}/Arquitectos/Ludwig Godefroy/fullsizerender-vsco.webp`,
        work: [
          `${BASE}/Arquitectos/Ludwig Godefroy/work/casa-to-ludwig-godefroy-mexico-architecture-hotel_dezeen_2364_col_6.jpg`,
          `${BASE}/Arquitectos/Ludwig Godefroy/work/casa-to-ludwig-godefroy-mexico-hotel-architecture_dezeen_2364_col_5.jpg`,
          `${BASE}/Arquitectos/Ludwig Godefroy/work/ludwig-godefroy-architecture-ramiro-chaves-foro-normandie.jpg`,
        ]
      },
      {
        name: 'Michelle Rojkind',
        portrait: `${BASE}/Arquitectos/Michelle Rojkind/RHTLAKG36JGJ3PBSAPV6OUIRIA.avif`,
        work: [
          `${BASE}/Arquitectos/Michelle Rojkind/work/63614.webp`,
          `${BASE}/Arquitectos/Michelle Rojkind/work/Michel Rojkind 9.png`,
          `${BASE}/Arquitectos/Michelle Rojkind/work/Nestle.jpg`,
        ]
      },
    ];

    const nameList   = document.getElementById('left');
    const portraitEl = document.getElementById('portrait-img');
    const workImgs   = document.querySelectorAll('.work-img');

    people.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'person-name' + (i === 0 ? ' active' : '');
      el.textContent = p.name;
      el.addEventListener('mouseenter', () => showPerson(i));
      nameList.appendChild(el);
    });

    function showPerson(idx) {
      const p = people[idx];
      document.querySelectorAll('.person-name').forEach((el, i) => el.classList.toggle('active', i === idx));
      portraitEl.classList.add('fade');
      setTimeout(() => { portraitEl.src = p.portrait; portraitEl.classList.remove('fade'); }, 150);
      workImgs.forEach((img, i) => {
        img.classList.add('fade');
        setTimeout(() => {
          img.src = p.work[i] || '';
          img.parentElement.style.visibility = p.work[i] ? '' : 'hidden';
          img.classList.remove('fade');
        }, 150);
      });
      // scroll right panel back to top on person switch
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    showPerson(0);

    // ── Lightbox ──
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    function openLightbox(src) { lbImg.src = src; lightbox.classList.add('open'); }
    function closeLightbox()   { lightbox.classList.remove('open'); lbImg.src = ''; }
    lightbox.addEventListener('click', e => { if (e.target !== lbImg) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    document.getElementById('portrait-img').addEventListener('click', function() {
      if (this.src) openLightbox(this.src);
    });
    document.querySelectorAll('.work-img').forEach(img => {
      img.addEventListener('click', function() { if (this.src) openLightbox(this.src); });
    });
  </script>
</body>
</html>
