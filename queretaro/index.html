<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Querétaro</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: var(--color-bg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    /* ── Header ── */
    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: var(--page-y) var(--page-x) 0;
      z-index: var(--z-overlay);
      display: flex; justify-content: space-between; align-items: flex-start;
    }
    #site-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em; color: var(--color-text);
      text-transform: uppercase; text-decoration: none;
    }

    /* ── Sub-nav ── */
    #sub-nav {
      position: fixed;
      top: calc(var(--page-y) + 1.6rem); left: var(--page-x);
      display: flex; align-items: center; gap: 1.8rem;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      z-index: calc(var(--z-overlay) - 1);
    }
    #sub-nav a { color: var(--color-text-muted); text-decoration: none; transition: color 150ms ease; }
    #sub-nav a:hover { color: var(--color-text); }

    /* ── Layout ── */
    #layout {
      position: fixed;
      top: var(--header-clearance);
      left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Left column ── */
    #left {
      width: 38%;
      padding-left: var(--page-x); padding-right: 4vw;
      flex-shrink: 0;
    }
    #project-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.6rem);
      letter-spacing: 0.04em; color: var(--color-text);
      text-transform: uppercase; margin-bottom: 0.6rem; line-height: 1;
    }
    #section-title {
      font-family: var(--font-display);
      font-size: clamp(0.7rem, 0.9vw, 0.85rem);
      letter-spacing: 0.14em; color: var(--color-text-secondary);
      text-transform: uppercase; margin-bottom: 1.6rem;
      padding-left: 1.4rem; white-space: nowrap;
    }
    #quote-block {
      font-style: italic;
      font-size: clamp(0.85rem, 1.3vw, 1.2rem);
      color: var(--color-text); line-height: 1.55;
      letter-spacing: 0.01em; margin-bottom: 1.4rem;
      padding-left: 1.4rem;
    }
    #author-block {
      font-style: normal;
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      color: var(--color-text-secondary);
      letter-spacing: 0.08em; padding-left: 1.4rem;
    }

    /* ── Right column ── */
    #right {
      flex: 1; max-height: 72vh; padding-right: var(--page-x);
      display: flex; flex-direction: column; align-items: flex-end;
    }
    #image-link { display: block; width: 100%; height: 100%; }
    #hero-image { width: 100%; height: 100%; object-fit: cover; display: block; }
    #image-caption {
      margin-top: 0.7rem;
      font-family: var(--font-body);
      font-size: clamp(0.65rem, 0.85vw, 0.8rem);
      color: var(--color-text-muted); letter-spacing: 0.04em;
      text-align: right; flex-shrink: 0;
    }
    #image-caption a { color: var(--color-text-muted); text-decoration: none; }
    #image-caption a:hover { color: var(--color-text); }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(250,250,248,0.97);
      z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity 480ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #lightbox.open { opacity: 1; pointer-events: auto; }
    #lightbox img {
      max-width: 90vw; max-height: 90vh;
      object-fit: contain; display: block;
      transform: translateY(16px); opacity: 0;
      transition: transform 700ms cubic-bezier(0.16, 1, 0.3, 1),
                  opacity   480ms cubic-bezier(0.4, 0, 0.2, 1);
    }
    #lightbox.open img { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
  </div>

  <nav id="sub-nav">
    <a href="/queretaro/arquitectos/">arquitectos</a>
    <a href="/queretaro/artistas/">artistas</a>
    <a href="/queretaro/museos/">museos</a>
    <a href="/queretaro/mutek/">mutek</a>
  </nav>

  <div id="layout">
    <div id="left">
      <div id="project-title">Querétaro</div>
      <div id="section-title">Nuestra Cosmogonía</div>
      <div id="quote-block">"Contemporary art deals with the real world of today. It can change the way people see the world and their own lives."</div>
      <div id="author-block">— Soichiro Fukutake</div>
    </div>

    <div id="right">
      <a id="image-link" href="#">
        <img id="hero-image" src="/queretaro/assets/aliya-orr-whispers.webp" alt="Aliya Orr — Whispers">
      </a>
      <div id="image-caption">
        Aliya Orr — <a href="https://www.aliyaorr.com/whispers" target="_blank" rel="noopener">Whispers ↗</a>
      </div>
    </div>
  </div>

  <!-- Lightbox -->
  <div id="lightbox"><img id="lb-img" src="" alt=""></div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');

    function openLightbox(src) { lbImg.src = src; lightbox.classList.add('open'); }
    function closeLightbox() {
      lightbox.classList.remove('open');
      lightbox.addEventListener('transitionend', () => { lbImg.src = ''; }, { once: true });
    }

    lightbox.addEventListener('click', e => { if (e.target !== lbImg) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

    document.getElementById('image-link').addEventListener('click', e => {
      e.preventDefault();
      openLightbox(document.getElementById('hero-image').src);
    });
  </script>
</body>
</html>
