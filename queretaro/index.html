<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Querétaro</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #fafaf8;
      font-family: 'EB Garamond', Georgia, serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      cursor: default;
      user-select: none;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: 5vh 6vw 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    #site-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em;
      color: #111111;
      text-transform: uppercase;
      text-decoration: none;
    }

    /* ── Navegar ── */
    #nav-container {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      position: relative;
    }

    #nav-menu {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      position: absolute;
      top: 100%;
      right: 0;
      padding-top: 0.8rem;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }

    #nav-container:hover #nav-menu {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    #nav-menu a {
      color: #999999;
      text-decoration: none;
      text-transform: uppercase;
    }

    #nav-menu a:hover { color: #111111; }

    #nav-trigger {
      color: #999999;
      cursor: default;
    }

    /* ── Layout ── */
    #layout {
      position: fixed;
      top: var(--header-clearance);
      left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Left column ── */
    #left {
      width: 38%;
      padding-left: 6vw;
      padding-right: 4vw;
      flex-shrink: 0;
    }

    #project-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(2rem, 4vw, 3.6rem);
      letter-spacing: 0.04em;
      color: #111111;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      line-height: 1;
    }

    #section-title {
      font-family: 'Archivo Black', sans-serif;
      font-size: clamp(0.7rem, 0.9vw, 0.85rem);
      letter-spacing: 0.14em;
      color: #555555;
      text-transform: uppercase;
      margin-bottom: 1.6rem;
      padding-left: 1.4rem;
      white-space: nowrap;
    }

    #quote-block {
      font-style: italic;
      font-size: clamp(0.85rem, 1.3vw, 1.2rem);
      color: #111111;
      line-height: 1.55;
      letter-spacing: 0.01em;
      margin-bottom: 1.4rem;
      padding-left: 1.4rem;
    }

    #author-block {
      font-style: normal;
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      color: #555555;
      letter-spacing: 0.08em;
      padding-left: 1.4rem;
    }

    /* ── Right column ── */
    #right {
      flex: 1;
      max-height: 72vh;
      padding-right: 6vw;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    #image-link {
      display: block;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }

    #hero-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    #image-caption {
      margin-top: 0.7rem;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(0.65rem, 0.85vw, 0.8rem);
      color: #999999;
      letter-spacing: 0.04em;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
  </div>

  <div id="layout">
    <div id="left">
      <div id="project-title">Querétaro</div>
      <div id="section-title">Nuestra Cosmogonía</div>
      <div id="quote-block">"Contemporary art deals with the real world of today. It can change the way people see the world and their own lives."</div>
      <div id="author-block">— Soichiro Fukutake</div>
    </div>

    <div id="right">
      <a id="image-link" href="https://www.aliyaorr.com/whispers" target="_blank" rel="noopener">
        <img id="hero-image" src="/queretaro/assets/aliya-orr-whispers.webp" alt="Aliya Orr — Whispers">
      </a>
      <div id="image-caption">Aliya Orr — Whispers</div>
    </div>
  </div>


</body>
</html>
