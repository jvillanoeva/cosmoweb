<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Querétaro / Mutek</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      background: #0e0e0e;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      cursor: default;
    }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      padding: var(--page-y) var(--page-x) 0;
      z-index: var(--z-overlay);
      display: flex; justify-content: space-between; align-items: flex-start;
      background: #0e0e0e;
    }
    #site-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em; color: #fafaf8;
      text-transform: uppercase; text-decoration: none;
    }
    #nav-container { font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.04em; position: relative; }
    #nav-trigger { color: #555; cursor: default; }
    #nav-menu {
      display: flex; flex-direction: column; gap: 0.55rem;
      position: absolute; top: 100%; right: 0; padding-top: 0.8rem;
      opacity: 0; pointer-events: none; transform: translateY(-4px);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    #nav-container:hover #nav-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
    #nav-menu a { color: #555; text-decoration: none; text-transform: uppercase; white-space: nowrap; }
    #nav-menu a:hover { color: #fafaf8; }

    #sub-nav {
      position: fixed;
      top: calc(var(--page-y) + 1.6rem); left: var(--page-x);
      display: flex; align-items: center; gap: 1.8rem;
      font-family: var(--font-mono); font-size: 0.62rem;
      letter-spacing: 0.07em; text-transform: uppercase;
      z-index: calc(var(--z-overlay) - 1);
      background: #0e0e0e;
    }
    #sub-nav a { color: #555; text-decoration: none; transition: color 150ms ease; }
    #sub-nav a:hover { color: #fafaf8; }
    #sub-nav a.active { color: #fafaf8; }
    #sub-nav .back { padding-right: 1rem; border-right: 1px solid #2a2a2a; }

    /* ── Scrollable gallery ── */
    #content {
      padding-top: var(--header-clearance);
      padding-left: var(--page-x);
      padding-right: var(--page-x);
      padding-bottom: var(--page-y);
    }

    #gallery {
      columns: 3;
      column-gap: 1.8vw;
    }

    @media (max-width: 700px) {
      #gallery { columns: 1; }
    }

    .gallery-img {
      width: 100%;
      display: block;
      margin-bottom: 1.8vw;
      break-inside: avoid;
      background: #1a1a1a;
      cursor: zoom-in;
    }

    /* ── Lightbox ── */
    #lightbox {
      position: fixed; inset: 0;
      background: rgba(10,10,10,0.97);
      z-index: 9999;
      display: none; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; display: block; cursor: default; }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
  </div>

  <nav id="sub-nav">
    <a href="/queretaro/" class="back">← querétaro</a>
    <a href="/queretaro/arquitectos/">arquitectos</a>
    <a href="/queretaro/artistas/">artistas</a>
    <a href="/queretaro/museos/">museos</a>
    <a href="/queretaro/mutek/" class="active">mutek</a>
  </nav>

  <div id="content">
    <div id="gallery">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/MUTEK . I . @daviddbarajas-260.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/Brian Eno Pres. Condensor__Diego Figueroa-2.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/EXPERIENCE - Brandt Brauer Frick  - LEO LUNA -6.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/fuse_ . dökk . avisions3 . @daviddbarajas-105.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/Apparat_Diego Figueroa3.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/2 Kelly Moran__Diego Figueroa-12 (1).jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/EXPERIENCE - Brandt Brauer Frick  - LEO LUNA -10.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/Copia de kazuya Nagaya &amp; Florence To - LEO LUNA -5.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/LeFantomeOnde81.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/Sougwen Chung45.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/MUTEK . I . @daviddbarajas-128.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/KOI3.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/93312034-3585-45F9-B24A-39BFAD94EDD2.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/06172592x172820221201.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/Photo 22.11.19, 21 12 29.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/papalote_1.jpg" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/IMG_7048.JPG" loading="lazy" onerror="this.style.display='none'">
      <img class="gallery-img" src="/queretaro/assets/MUTEK/M5s.jpg" loading="lazy" onerror="this.style.display='none'">
    </div>
  </div>

  <div id="lightbox"><img id="lb-img" src="" alt=""></div>

  <script>
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lb-img');
    function openLightbox(src) { lbImg.src = src; lightbox.classList.add('open'); }
    function closeLightbox()   { lightbox.classList.remove('open'); lbImg.src = ''; }
    lightbox.addEventListener('click', e => { if (e.target !== lbImg) closeLightbox(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });
    document.querySelectorAll('.gallery-img').forEach(img => {
      img.addEventListener('click', function() { if (this.src) openLightbox(this.src); });
    });
  </script>
</body>
</html>
