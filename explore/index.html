<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Cosmo — Explore</title>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/base.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; min-height: 100%;
      background: var(--color-bg);
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      cursor: default;
    }

    /* ── Header ── */
    #header {
      position: fixed;
      top: 0; left: 0; right: 0;
      padding: var(--page-y) var(--page-x) 0;
      z-index: var(--z-overlay);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      background: var(--color-bg);
    }

    #site-title {
      font-family: var(--font-display);
      font-size: clamp(0.85rem, 1.2vw, 1rem);
      letter-spacing: 0.14em;
      color: var(--color-text);
      text-transform: uppercase;
      text-decoration: none;
    }

    /* ── Navegar ── */
    #nav-trigger {
      font-family: var(--font-mono);
      font-size: 0.72rem;
      letter-spacing: 0.04em;
      color: var(--color-text-muted);
      cursor: default;
    }

    /* ── Filter bar (revealed on navegar hover) ── */
    #filter-bar {
      position: fixed;
      top: var(--page-y);
      left: 0; right: 0;
      padding: 2.2rem var(--page-x) 0;
      display: flex;
      flex-wrap: nowrap;
      gap: 1.6rem;
      overflow-x: auto;
      scrollbar-width: none;
      opacity: 0;
      pointer-events: none;
      transform: translateY(-6px);
      transition: opacity 180ms ease, transform 180ms ease;
      background: var(--color-bg);
      z-index: calc(var(--z-overlay) - 1);
    }
    #filter-bar::-webkit-scrollbar { display: none; }
    #filter-bar.visible { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .filter-link {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      cursor: pointer;
      white-space: nowrap;
      background: none;
      border: none;
      padding: 0;
      transition: color 150ms ease;
    }
    .filter-link:hover,
    .filter-link.active { color: var(--color-text); }

    /* ── Grid view ── */
    #grid-view {
      padding-top: 13vh;
    }

    /* ── Grid ── */
    /*
      Golden ratio grid:
        page-x = 6vw, gap = 2.5vw
        5 cols across 78vw → each col ≈ 15.6vw
        Hero (3col × 2row): 51.8vw wide × 32.5vw tall → ratio 1.594 ≈ φ (1.618)
    */
    #grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-auto-rows: 15vw;
      grid-auto-flow: dense;
      gap: 2.5vw;
      padding: 0 var(--page-x) var(--page-y);
    }

    .card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--color-surface);
      grid-column: span 1;
      grid-row: span 1;
    }

    /* Non-hero rhythm: occasional wide card for visual variety */
    .card:not(.card--hero):nth-child(4n+3) { grid-column: span 2; }

    /* Hero: 3col × 2row ≈ φ — alternates left / right */
    .card.card--hero-left  { grid-column: 1 / 4; grid-row: span 2; }
    .card.card--hero-right { grid-column: 3 / 6; grid-row: span 2; }

    @media (max-width: 700px) {
      #grid {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: 42vw;
      }
      .card:not(.card--hero-left):not(.card--hero-right):nth-child(4n+3) { grid-column: span 1; }
      .card.card--hero-left,
      .card.card--hero-right { grid-column: 1 / -1; grid-row: span 2; }
    }

    .card img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 400ms ease;
    }
    .card:hover img { transform: scale(1.03); }

    .card-label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: flex-end;
      padding: 1.2rem;
      background: linear-gradient(to top, rgba(0,0,0,0.45) 0%, transparent 60%);
      opacity: 0;
      transition: opacity 200ms ease;
    }
    .card:hover .card-label { opacity: 1; }

    .card-label span {
      font-family: var(--font-display);
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #fff;
    }

    /* ── Project view ── */
    #project-view {
      display: none;
      position: fixed;
      inset: 0;
      background: var(--color-bg);
      z-index: 5;
    }

    #project-left {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      width: 36%;
      padding: var(--header-clearance) var(--page-x) var(--page-y);
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    #back-btn {
      font-family: var(--font-mono);
      font-size: 0.68rem;
      letter-spacing: 0.06em;
      color: var(--color-text-muted);
      text-decoration: none;
      text-transform: uppercase;
      position: absolute;
      top: var(--header-clearance);
      left: var(--page-x);
    }
    #back-btn:hover { color: var(--color-text); }

    #project-name {
      font-family: var(--font-display);
      font-size: clamp(2rem, 4vw, 3.6rem);
      letter-spacing: 0.04em;
      color: var(--color-text);
      text-transform: uppercase;
      line-height: 1;
      margin-bottom: 0.6rem;
    }

    #project-description {
      font-family: var(--font-body);
      font-style: italic;
      font-size: clamp(0.8rem, 1.1vw, 1rem);
      color: var(--color-text-secondary);
      line-height: 1.5;
      margin-bottom: 1.2rem;
      padding-left: 1.4rem;
    }

    #project-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      padding-left: 1.4rem;
    }

    .project-tag {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      border: 1px solid var(--color-surface);
      padding: 0.2rem 0.6rem;
    }

    #project-right {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      left: 36%;
      overflow-y: auto;
      padding-top: 0;
      padding-right: 0;
      padding-bottom: 0;
    }

    #project-images {
      display: flex;
      flex-direction: column;
    }

    .project-img-wrap { width: 100%; background: var(--color-surface); }
    .project-img-wrap img { width: 100%; height: auto; display: block; }
  </style>
</head>
<body>

  <div id="header">
    <a id="site-title" href="/">Cosmo</a>
    <div id="nav-trigger">navegar _</div>
  </div>

  <div id="filter-bar"></div>

  <!-- Grid view -->
  <div id="grid-view">
    <div id="grid"></div>
  </div>

  <!-- Project view -->
  <div id="project-view">
    <a id="back-btn" href="https://ccoossmmoo.com/explore/">← explore</a>
    <div id="project-left">
      <div id="project-name"></div>
      <div id="project-description"></div>
      <div id="project-tags"></div>
    </div>
    <div id="project-right">
      <div id="project-images"></div>
    </div>
  </div>

  <script>
    const API      = 'https://cosmo.ccoossmmoo.com';
    const IMG      = `${API}/images`;
    // Local fallback paths (relative from explore/ to cosmo_images/)
    const LOCAL_TAGS = './local-tags.json';
    const LOCAL_IMG  = 'https://cosmo.ccoossmmoo.com/images';
    let allProjects = [];
    let activeTag   = null;
    let imgBase     = IMG;

    // ── Boot ──────────────────────────────────────────────────────────────
    async function init() {
      try {
        allProjects = await fetch(`${API}/api/projects`).then(r => r.json());
        imgBase = IMG;
      } catch (e) {
        // Lola unreachable — try local tags.json from Box
        try {
          const data = await fetch(LOCAL_TAGS).then(r => r.json());
          allProjects = (data.projects || []).filter(p => p.project !== 'unknown' && p.project !== 'exclude');
          imgBase = LOCAL_IMG;
        } catch (e2) {
          document.getElementById('grid').innerHTML =
            '<p style="padding:4vh 6vw;font-family:monospace;color:#999;font-size:0.75rem;">connecting to lola...</p>';
          return;
        }
      }

      const params    = new URLSearchParams(location.search);
      const projectId = params.get('p');

      if (projectId) {
        const proj = allProjects.find(p => p.project === projectId);
        if (proj) { showProject(proj); return; }
      }

      // shuffle on every load so the grid feels alive
      for (let i = allProjects.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allProjects[i], allProjects[j]] = [allProjects[j], allProjects[i]];
      }

      buildFilterBar();
      renderGrid(allProjects);
    }

    // ── Filter bar ────────────────────────────────────────────────────────
    function buildFilterBar() {
      const bar  = document.getElementById('filter-bar');
      const tags = [...new Set(allProjects.flatMap(p => p.tags))].sort();

      const all = makeFilterLink('all', true);
      all.addEventListener('click', () => setFilter(null, all));
      bar.appendChild(all);

      tags.forEach(tag => {
        const btn = makeFilterLink(tag, false);
        btn.addEventListener('click', () => setFilter(tag, btn));
        bar.appendChild(btn);
      });
    }

    function makeFilterLink(label, active) {
      const btn = document.createElement('button');
      btn.className = 'filter-link' + (active ? ' active' : '');
      btn.textContent = label;
      return btn;
    }

    function setFilter(tag, el) {
      document.querySelectorAll('.filter-link').forEach(b => b.classList.remove('active'));
      el.classList.add('active');
      const filtered = tag ? allProjects.filter(p => p.tags.includes(tag)) : allProjects;
      renderGrid(filtered);
    }

    // ── Navegar hover ─────────────────────────────────────────────────────
    const navTrigger = document.getElementById('nav-trigger');
    const filterBar  = document.getElementById('filter-bar');
    let hideTimer;

    function showBar()  { clearTimeout(hideTimer); filterBar.classList.add('visible'); }
    function schedHide(){ hideTimer = setTimeout(() => filterBar.classList.remove('visible'), 120); }

    navTrigger.addEventListener('mouseenter', showBar);
    navTrigger.addEventListener('mouseleave', schedHide);
    filterBar.addEventListener('mouseenter',  showBar);
    filterBar.addEventListener('mouseleave',  schedHide);

    // ── Grid ─────────────────────────────────────────────────────────────
    function renderGrid(projects) {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      let heroIdx = 0;
      projects.forEach(proj => {
        const cover = proj.images[0];
        const card  = document.createElement('div');
        if (proj.featured) {
          card.className = 'card ' + (heroIdx++ % 2 === 0 ? 'card--hero-left' : 'card--hero-right');
        } else {
          card.className = 'card';
        }
        card.innerHTML = `
          <img src="${imgBase}/${encodeURIComponent(cover)}" alt="${proj.label}" loading="lazy" onerror="this.style.opacity='0'">
          <div class="card-label"><span>${proj.label}</span></div>
        `;
        card.addEventListener('click', () => {
          history.pushState({}, '', `/explore/?p=${proj.project}`);
          showProject(proj);
        });
        grid.appendChild(card);
      });
    }

    // ── Project view ──────────────────────────────────────────────────────
    function showProject(proj) {
      document.getElementById('grid-view').style.display    = 'none';
      document.getElementById('project-view').style.display = 'block';
      document.title = `Cosmo — ${proj.label}`;

      document.getElementById('project-name').textContent        = proj.label;
      document.getElementById('project-description').textContent = proj.description || '';
      document.getElementById('project-description').style.display = proj.description ? '' : 'none';

      const tagsEl = document.getElementById('project-tags');
      tagsEl.innerHTML = proj.tags.map(t =>
        `<span class="project-tag">${t}</span>`
      ).join('');

      const imgsEl = document.getElementById('project-images');
      imgsEl.innerHTML = proj.images.map(file => `
        <div class="project-img-wrap">
          <img src="${imgBase}/${encodeURIComponent(file)}" alt="${proj.label}" loading="lazy" onerror="this.parentElement.style.display='none'">
        </div>
      `).join('');
    }

    // ── Back nav ──────────────────────────────────────────────────────────
    document.getElementById('back-btn').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'https://ccoossmmoo.com/explore/';
    });

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(location.search);
      const id     = params.get('p');
      if (id) {
        const proj = allProjects.find(p => p.project === id);
        if (proj) { showProject(proj); }
      } else {
        document.getElementById('project-view').style.display = 'none';
        document.getElementById('grid-view').style.display    = '';
      }
    });

    init();
  </script>
</body>
</html>
